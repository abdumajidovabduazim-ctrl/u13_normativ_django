<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>

        {{ post.title }}

    </title>

    <style>

        body{

            font-family:Arial;

            background:#f5f5f5;

            padding:40px;

        }

        .card{

            width:700px;

            margin:auto;

            background:white;

            padding:30px;

            border-radius:10px;

        }

        img{

            width:100%;

            max-width:500px;

            border-radius:10px;

            margin-top:20px;

        }

        a{

            text-decoration:none;

        }

    </style>

</head>

<body>

<div class="card">

<h1>

{{ post.title }}

</h1>

<p>

{{ post.content }}

</p>

{% if post.image %}

<img

src="{{ post.image.url }}"

alt="{{ post.title }}"

>

{% endif %}

<br><br>

<a href="{% url 'post_list' %}">

⬅ Back

</a>

</div>

</body>

</html>
